name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS ではユニバーサルバイナリのため両アーキテクチャのターゲットをインストール
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # アップデート署名キー（必須）
          # 生成方法: pnpm tauri signer generate -w ~/.tauri/sun-riseup-viewrrr.key
          # TAURI_SIGNING_PRIVATE_KEY: GitHub Secrets に "TAURI_SIGNING_PRIVATE_KEY" として登録
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: キーにパスワードを設定した場合のみ必要
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS コード署名（任意・Apple Developer Program 加入時のみ）
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'sun-riseup-viewrrr ${{ github.ref_name }}'
          releaseBody: |
            ## ダウンロード

            お使いの OS に合わせたインストーラーをダウンロードしてください。

            | プラットフォーム | ファイル形式 |
            |---|---|
            | macOS (Apple Silicon) | `.dmg` (`aarch64`) |
            | macOS (Intel) | `.dmg` (`x86_64`) |
            | Windows | `.msi` または `.exe` |
            | Linux | `.AppImage` または `.deb` |

            詳細は [CHANGELOG](https://github.com/hk-pG/sun-riseup-viewrrr/blob/main/CHANGELOG.md) を参照してください。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
